services:
  - type: web
    name: casey-titan-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: CASEY_DEMO_LIMIT_PER_IP
        value: "1"
